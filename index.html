<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="나의 레시피">
<meta name="theme-color" content="#F5E6C8">
<title>나의 레시피</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --wood-dark:#7B4F2E;--wood:#A0622A;--wood-light:#C8884A;
  --cream:#FDF6E3;--cream2:#F5EBCC;--cream3:#EAD9A8;
  --brown:#4A2E12;--brown2:#7A4E28;--brown3:#B07840;
  --border:#C49A5A;--card:#FFFBF0;
  --yellow:#F4D03F;--orange:#E67E22;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;max-width:430px;margin:0 auto;background:#E8C890;color:var(--brown);font-family:'Noto Sans KR',sans-serif;font-size:14px;overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column;position:relative}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

/* ── 주방 배경 SVG ── */
.kitchen-bg{
  position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;
  background:
    linear-gradient(180deg,
      #D4956A 0%,
      #C07A45 15%,
      #E8C090 30%,
      #F0D4A0 55%,
      #E8C888 70%,
      #D4B070 100%
    );
}
/* 주방 SVG 배경 레이어 */
.kitchen-svg{position:fixed;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}

/* 반투명 오버레이로 가독성 확보 */
.screen-overlay{position:fixed;inset:0;z-index:2;pointer-events:none;background:rgba(245,230,200,0.18)}

/* 모든 콘텐츠는 z-index:3 이상 */
#app > .screen{z-index:3;position:relative}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;gap:8px;
  padding:50px 16px 12px;
  background:rgba(120,70,20,0.82);
  backdrop-filter:blur(8px);
  border-bottom:2px solid rgba(196,154,90,0.6);
  flex-shrink:0;
}
.topbar h1{flex:1;font-family:'Black Han Sans',sans-serif;font-size:19px;font-weight:400;color:#FDF6E3;text-shadow:0 1px 3px rgba(0,0,0,0.4)}
.icon-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border:2px solid rgba(196,154,90,0.7);background:rgba(255,251,240,0.15);cursor:pointer;border-radius:10px;color:#F5DEB3;transition:all 0.1s;flex-shrink:0;backdrop-filter:blur(4px)}
.icon-btn:active{background:rgba(255,251,240,0.3);transform:scale(0.93)}
.icon-btn.danger{border-color:rgba(192,57,43,0.7);color:#FF8070}

/* ── HOME ── */
.home-header{
  padding:22px 18px 14px;
  background:rgba(100,55,10,0.55);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(196,154,90,0.3);
  flex-shrink:0;
}
.home-header .greeting{font-size:12px;color:rgba(245,222,179,0.8);margin-bottom:3px}
.home-header .big-title{font-family:'Black Han Sans',sans-serif;font-size:26px;color:#FDF6E3;letter-spacing:-1px;text-shadow:0 2px 6px rgba(0,0,0,0.35)}
.home-header .desc{font-size:12px;color:rgba(245,222,179,0.7);margin-top:5px;line-height:1.5}

.section-ribbon{display:flex;align-items:center;gap:0;margin:14px 16px 10px}
.section-ribbon .ribbon-text{background:rgba(74,46,18,0.85);color:#FDF6E3;font-family:'Black Han Sans',sans-serif;font-size:13px;padding:5px 14px;border-radius:4px;backdrop-filter:blur(4px);border:1px solid rgba(196,154,90,0.4)}
.section-ribbon::after{content:'';flex:1;height:1px;background:rgba(196,154,90,0.4);margin-left:10px}

/* ── 카테고리 카드 (2번 이미지 스타일) ── */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 100px}
.cat-card{
  border-radius:20px;cursor:pointer;
  background:rgba(255,251,240,0.88);
  backdrop-filter:blur(6px);
  border:1.5px solid rgba(255,255,255,0.6);
  box-shadow:0 8px 24px rgba(60,30,0,0.25),0 2px 6px rgba(0,0,0,0.15);
  overflow:hidden;
  transition:transform 0.12s,box-shadow 0.12s;
  animation:popIn 0.22s ease both;
  display:flex;flex-direction:column;
}
.cat-card:active{transform:scale(0.96);box-shadow:0 4px 12px rgba(60,30,0,0.2)}
.cat-img-wrap{
  height:120px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  background:linear-gradient(160deg,#FFF9F0 0%,#FFF0DC 100%);
}
.cat-img-wrap svg{filter:drop-shadow(0 6px 12px rgba(80,40,0,0.22));transition:transform 0.12s}
.cat-card:active .cat-img-wrap svg{transform:scale(0.95)}
.cat-info{padding:10px 14px 12px;background:transparent}
.cat-name{font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--brown);letter-spacing:-0.3px}
.cat-count{font-size:11px;color:var(--brown3);margin-top:2px}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(20px + var(--safe-bottom));right:20px;width:56px;height:56px;border-radius:50%;background:rgba(74,46,18,0.9);backdrop-filter:blur(8px);border:2px solid rgba(196,154,90,0.7);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,0.35);transition:transform 0.1s;z-index:100}
.fab:active{transform:scale(0.92)}
.fab svg{color:#FDF6E3}

/* ── LIST ── */
.list-search{padding:10px 16px 6px}
.search-box{display:flex;align-items:center;gap:8px;background:rgba(255,251,240,0.85);backdrop-filter:blur(6px);border:1.5px solid rgba(255,255,255,0.6);border-radius:12px;padding:9px 13px;box-shadow:0 3px 10px rgba(0,0,0,0.15)}
.search-box input{border:none;background:none;color:var(--brown);font-size:14px;font-family:inherit;flex:1;outline:none}
.search-box input::placeholder{color:var(--brown3)}
.search-box svg{color:var(--brown3);flex-shrink:0}
.sub-cat-scroll{display:flex;gap:8px;padding:6px 16px 10px;overflow-x:auto;flex-shrink:0}
.sub-cat-scroll::-webkit-scrollbar{display:none}
.sub-chip{white-space:nowrap;padding:5px 13px;border-radius:20px;border:1.5px solid rgba(196,154,90,0.6);background:rgba(255,251,240,0.75);backdrop-filter:blur(4px);color:var(--brown2);font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;transition:all 0.12s}
.sub-chip.active{background:rgba(74,46,18,0.85);border-color:rgba(74,46,18,0.9);color:#FDF6E3}
.recipe-list-wrap{padding:4px 16px 24px;display:flex;flex-direction:column;gap:10px}
.add-recipe-card{display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(255,251,240,0.55);backdrop-filter:blur(4px);border:2px dashed rgba(196,154,90,0.7);border-radius:16px;padding:18px 14px;cursor:pointer;transition:all 0.15s;animation:slideIn 0.15s ease both}
.add-recipe-card:active{background:rgba(244,208,63,0.25);border-color:rgba(196,154,90,1);transform:scale(0.98)}
.add-recipe-card .arc-icon{width:44px;height:44px;border-radius:12px;background:rgba(74,46,18,0.12);border:1.5px solid rgba(196,154,90,0.5);display:flex;align-items:center;justify-content:center}
.add-recipe-card .arc-text{font-size:15px;font-weight:700;color:rgba(74,46,18,0.7);font-family:'Black Han Sans',sans-serif;letter-spacing:-0.3px}

/* ── 레시피 행 (탑뷰 아이콘) ── */
.recipe-row{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,251,240,0.88);backdrop-filter:blur(6px);
  border:1.5px solid rgba(255,255,255,0.6);
  border-radius:16px;padding:12px 14px;cursor:pointer;
  box-shadow:0 4px 16px rgba(60,30,0,0.18);
  transition:transform 0.1s,box-shadow 0.1s;
  animation:slideIn 0.15s ease both;
}
.recipe-row:active{transform:scale(0.98);box-shadow:0 2px 8px rgba(60,30,0,0.15)}
.rr-icon-box{
  width:54px;height:54px;border-radius:14px;
  background:linear-gradient(145deg,#FFF9F0,#FFE8C8);
  border:1.5px solid rgba(196,154,90,0.35);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 3px 8px rgba(80,40,0,0.15);overflow:hidden;
}
.rr-icon-box svg{filter:drop-shadow(0 3px 5px rgba(80,40,0,0.2))}
.rr-body{flex:1;min-width:0}
.rr-name{font-size:15px;font-weight:700;color:var(--brown);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rr-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.rr-badge{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(234,217,168,0.7);color:var(--brown2);border:1px solid rgba(196,154,90,0.5);font-weight:700}
.rr-badge.series{background:rgba(244,208,63,0.75);border-color:rgba(230,126,34,0.6);color:var(--brown)}
.rr-arrow{color:var(--brown3);flex-shrink:0}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:rgba(255,251,240,0.7);text-align:center}
.empty-state .em-icon{font-size:50px}
.empty-state p{font-size:14px;line-height:1.7;color:rgba(255,251,240,0.85)}

/* ── DETAIL ── */
.detail-hero{padding:14px 16px;border-bottom:1px solid rgba(196,154,90,0.3);flex-shrink:0;background:rgba(100,55,10,0.45);backdrop-filter:blur(10px)}
.hero-inner{background:rgba(255,251,240,0.88);backdrop-filter:blur(6px);border:1.5px solid rgba(255,255,255,0.7);border-radius:18px;padding:16px;box-shadow:0 6px 20px rgba(60,30,0,0.2)}
.hero-top{display:flex;gap:14px;align-items:flex-start}
.hero-icon-big{width:80px;height:80px;background:linear-gradient(145deg,#FFF9F0,#FFE8C8);border:2px solid rgba(196,154,90,0.4);border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(80,40,0,0.18);overflow:hidden}
.hero-icon-big svg{filter:drop-shadow(0 4px 8px rgba(80,40,0,0.25))}
.hero-info{flex:1}
.hero-cats{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap}
.hero-cat-badge{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(244,208,63,0.8);color:var(--brown);border:1px solid rgba(230,126,34,0.6);font-weight:700}
.hero-name{font-family:'Black Han Sans',sans-serif;font-size:21px;color:var(--brown);line-height:1.2;letter-spacing:-0.5px}
.hero-divider{width:100%;height:1px;background:rgba(196,154,90,0.3);margin:12px 0}
.hero-stats{display:flex}
.hero-stat{flex:1;text-align:center;padding:4px 0;border-right:1px solid rgba(196,154,90,0.3)}
.hero-stat:last-child{border-right:none}
.hs-label{font-size:10px;color:var(--brown3);margin-bottom:2px}
.hs-val{font-size:14px;font-weight:700;color:var(--brown)}

/* DETAIL BODY */
.detail-body-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:rgba(245,235,210,0.25);backdrop-filter:blur(4px)}
.detail-body-wrap::-webkit-scrollbar{display:none}
.section{padding:14px 16px 0}
.section-title{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.section-title .st-icon{font-size:16px}
.section-title .st-text{font-family:'Black Han Sans',sans-serif;font-size:15px;color:#FDF6E3;text-shadow:0 1px 3px rgba(0,0,0,0.4)}
.section-title::after{content:'';flex:1;height:1px;background:rgba(196,154,90,0.4)}

.servings-card{background:rgba(255,251,240,0.85);backdrop-filter:blur(6px);border:1.5px solid rgba(255,255,255,0.6);border-radius:12px;padding:12px 14px;box-shadow:0 3px 10px rgba(60,30,0,0.12)}
.servings-row{display:flex;align-items:center;gap:12px}
.servings-row label{font-size:13px;color:var(--brown2);font-weight:700}
.servings-row input[type=range]{flex:1;-webkit-appearance:none;height:5px;background:rgba(196,154,90,0.4);border-radius:3px;outline:none;cursor:pointer}
.servings-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--brown);border:3px solid #FDF6E3;box-shadow:0 0 0 2px var(--brown3)}
.servings-out{font-size:14px;font-weight:700;color:var(--brown);min-width:42px;text-align:right}

.ing-list{display:flex;flex-direction:column;gap:7px}
.ing-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,251,240,0.82);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.6);border-radius:10px;cursor:pointer;box-shadow:0 2px 8px rgba(60,30,0,0.1);transition:all 0.1s}
.ing-row:active{transform:scale(0.98)}
.ing-check{width:22px;height:22px;border-radius:6px;border:2px solid rgba(196,154,90,0.7);background:rgba(255,251,240,0.9);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.ing-row.checked .ing-check{background:var(--brown);border-color:var(--brown)}
.ing-row.checked .ing-name{text-decoration:line-through;color:var(--brown3)}
.ing-name{flex:1;font-size:14px;color:var(--brown)}
.ing-amt{font-size:13px;font-weight:700;color:var(--brown2)}

.steps-list{display:flex;flex-direction:column;gap:9px}
.step-item{display:flex;gap:10px;background:rgba(255,251,240,0.82);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.6);border-radius:12px;padding:13px 12px;box-shadow:0 2px 8px rgba(60,30,0,0.1)}
.step-num-circle{width:26px;height:26px;border-radius:50%;background:var(--brown);color:#FDF6E3;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;border:2px solid var(--brown2)}
.step-text{font-size:14px;color:var(--brown);line-height:1.7;flex:1}
.timer-trigger{display:inline-flex;align-items:center;gap:5px;margin-top:8px;background:rgba(244,208,63,0.85);color:var(--brown);border:1.5px solid rgba(230,126,34,0.7);border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;box-shadow:0 2px 6px rgba(60,30,0,0.15)}

.timer-bar{background:rgba(100,55,10,0.85);backdrop-filter:blur(10px);border-top:1px solid rgba(196,154,90,0.4);padding:12px 16px calc(12px + var(--safe-bottom));display:none;align-items:center;gap:10px;flex-shrink:0}
.timer-display{font-family:'Black Han Sans',sans-serif;font-size:30px;color:#FDF6E3;min-width:88px}
.timer-lbl{font-size:11px;color:rgba(245,222,179,0.7);font-weight:700}
.t-btn{padding:9px 14px;border-radius:10px;border:1.5px solid rgba(196,154,90,0.6);background:rgba(255,251,240,0.15);color:#FDF6E3;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;backdrop-filter:blur(4px)}
.t-btn.primary{background:rgba(74,46,18,0.9);border-color:rgba(196,154,90,0.8)}
.t-btn:active{opacity:0.75}

/* ── FORM ── */
.form-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 16px;display:flex;flex-direction:column;gap:14px;background:rgba(245,235,210,0.2);backdrop-filter:blur(4px)}
.form-scroll::-webkit-scrollbar{display:none}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:11px;color:#FDF6E3;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;text-shadow:0 1px 3px rgba(0,0,0,0.4)}
.form-input,.form-select,.form-textarea{width:100%;padding:11px 13px;background:rgba(255,251,240,0.88);backdrop-filter:blur(4px);border:1.5px solid rgba(255,255,255,0.6);border-radius:10px;color:var(--brown);font-size:14px;font-family:'Noto Sans KR',inherit;outline:none;-webkit-appearance:none;box-shadow:0 2px 8px rgba(60,30,0,0.1)}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:rgba(196,154,90,0.9);background:rgba(255,251,240,0.95)}
.form-textarea{resize:vertical;min-height:68px;line-height:1.6}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ing-add-row{display:flex;gap:8px}
.ing-add-row .form-input:first-child{flex:1}
.ing-add-row .form-input:last-child{width:88px}
.chips-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;background:rgba(244,208,63,0.85);color:var(--brown);border-radius:20px;cursor:pointer;border:1.5px solid rgba(230,126,34,0.6);font-weight:700}
.step-entries{display:flex;flex-direction:column;gap:8px}
.step-entry{display:flex;gap:8px;align-items:flex-start}
.step-entry .step-num-circle{flex-shrink:0;margin-top:11px}
.step-entry .form-textarea{flex:1;min-height:58px}
.step-entry .rm-btn{background:none;border:none;cursor:pointer;color:rgba(245,222,179,0.7);padding:8px 2px;margin-top:8px}
.add-line-btn{display:flex;align-items:center;gap:6px;background:rgba(255,251,240,0.2);backdrop-filter:blur(4px);border:1.5px dashed rgba(196,154,90,0.6);border-radius:10px;padding:10px;color:rgba(245,222,179,0.85);font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;width:100%;justify-content:center}
.home-cat-pick-btn{width:100%;padding:14px 18px;background:rgba(255,251,240,0.9);border:2px solid rgba(196,154,90,0.5);border-radius:14px;font-size:16px;font-weight:700;color:var(--brown);cursor:pointer;font-family:'Noto Sans KR',inherit;text-align:left;box-shadow:0 2px 8px rgba(60,30,0,0.1);transition:all 0.1s}
.home-cat-pick-btn:active{background:rgba(244,208,63,0.3);transform:scale(0.98)}
.add-line-btn:active{background:rgba(255,251,240,0.3)}
.save-btn{background:rgba(74,46,18,0.9);backdrop-filter:blur(8px);color:#FDF6E3;border:2px solid rgba(196,154,90,0.7);border-radius:14px;padding:15px;font-family:'Black Han Sans',sans-serif;font-size:17px;cursor:pointer;width:calc(100% - 32px);margin:0 16px calc(16px + var(--safe-bottom));flex-shrink:0;box-shadow:0 6px 20px rgba(0,0,0,0.3);letter-spacing:0.5px}
.save-btn:active{opacity:0.85;transform:scale(0.98)}

/* ── ICON PICKER ── */
.icon-picker-overlay{position:fixed;inset:0;background:rgba(40,20,0,0.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.icon-picker-sheet{background:rgba(253,246,227,0.96);backdrop-filter:blur(12px);border:1.5px solid rgba(196,154,90,0.5);border-radius:24px 24px 0 0;width:100%;max-width:430px;padding:0 0 calc(16px + var(--safe-bottom));box-shadow:0 -8px 30px rgba(0,0,0,0.3);animation:sheetUp 0.22s ease}
.icon-picker-handle{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid rgba(196,154,90,0.3)}
.icon-picker-handle h3{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--brown)}
.icon-picker-handle button{background:none;border:none;cursor:pointer;color:var(--brown3);font-size:20px}
.icon-picker-groups{overflow-y:auto;max-height:55vh;padding:10px 16px;display:flex;flex-direction:column;gap:14px}
.icon-picker-groups::-webkit-scrollbar{display:none}
.icon-group-label{font-size:11px;font-weight:700;color:var(--brown3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px}
.icon-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.icon-option{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border:1.5px solid rgba(196,154,90,0.4);border-radius:12px;cursor:pointer;background:rgba(255,251,240,0.9);box-shadow:0 2px 6px rgba(60,30,0,0.1);transition:all 0.1s;overflow:hidden}
.icon-option:active{transform:scale(0.95)}
.icon-option.selected{border-color:var(--brown);background:rgba(244,208,63,0.3);box-shadow:0 2px 8px rgba(196,154,90,0.4)}
.icon-option .ico{width:44px;height:44px;display:flex;align-items:center;justify-content:center}
.icon-option .ico svg{filter:drop-shadow(0 2px 4px rgba(80,40,0,0.2))}
.icon-option .ico-label{font-size:9px;color:var(--brown2);font-weight:700;text-align:center;line-height:1.2;padding:0 2px}

.icon-selector-btn{display:flex;align-items:center;gap:12px;background:rgba(255,251,240,0.88);backdrop-filter:blur(4px);border:1.5px solid rgba(255,255,255,0.6);border-radius:12px;padding:10px 14px;cursor:pointer;box-shadow:0 2px 8px rgba(60,30,0,0.1)}
.preview-icon{width:52px;height:52px;background:linear-gradient(145deg,#FFF9F0,#FFE8C8);border:1.5px solid rgba(196,154,90,0.35);border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.preview-icon svg{filter:drop-shadow(0 3px 6px rgba(80,40,0,0.2))}
.preview-info{flex:1}
.preview-name{font-size:14px;font-weight:700;color:var(--brown)}
.preview-hint{font-size:11px;color:var(--brown3);margin-top:2px}
.preview-arrow{color:var(--brown3)}

@keyframes popIn{from{opacity:0;transform:scale(0.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>

<div class="screen-overlay"></div>

<div id="app">

<!-- HOME -->
<div id="home-screen" class="screen active">
  <div class="topbar"><h1>🍽️ 나의 레시피</h1></div>
  <div class="scroll" style="background:transparent">
    <div class="home-header">
      <div class="greeting">오늘도 맛있는 하루 ✨</div>
      <div class="big-title">레시피 노트</div>
      <div class="desc">내가 만든 소중한 레시피들을 꺼내보세요 🌿</div>
    </div>
    <div class="section-ribbon"><span class="ribbon-text">카테고리 선택</span></div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>
  <!-- 홈 FAB -->
  <button class="fab" onclick="openHomeCatPicker()" aria-label="레시피 추가">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</div>

<!-- 홈 카테고리 선택 바텀시트 -->
<div class="icon-picker-overlay" id="home-cat-picker" style="display:none" onclick="closeHomeCatPicker(event)">
  <div class="icon-picker-sheet">
    <div class="icon-picker-handle">
      <h3>어느 카테고리에 추가할까요?</h3>
      <button onclick="document.getElementById('home-cat-picker').style.display='none'">✕</button>
    </div>
    <div style="padding:12px 16px 8px;display:flex;flex-direction:column;gap:10px">
      <button class="home-cat-pick-btn" onclick="pickHomeCat('제빵')">🍞 &nbsp;제빵</button>
      <button class="home-cat-pick-btn" onclick="pickHomeCat('제과')">🎂 &nbsp;제과</button>
      <button class="home-cat-pick-btn" onclick="pickHomeCat('캠핑요리')">🏕️ &nbsp;캠핑요리</button>
      <button class="home-cat-pick-btn" onclick="pickHomeCat('간단요리')">🍳 &nbsp;간단요리</button>
    </div>
  </div>
</div>

<!-- LIST -->
<div id="list-screen" class="screen" style="background:rgba(160,100,40,0.3);backdrop-filter:blur(2px)">
  <div class="topbar">
    <button class="icon-btn" onclick="goHome()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
    <h1 id="list-title"></h1>
  </div>
  <div class="list-search"><div class="search-box">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="레시피 검색..." oninput="renderRecipeList()">
  </div></div>
  <div class="sub-cat-scroll" id="sub-cat-scroll"></div>
  <div class="scroll"><div class="recipe-list-wrap" id="recipe-list-wrap"></div></div>
</div>

<!-- DETAIL -->
<div id="detail-screen" class="screen" style="background:rgba(140,85,25,0.25);backdrop-filter:blur(2px)">
  <div class="topbar">
    <button class="icon-btn" onclick="goBack()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
    <h1 id="detail-topbar-title" style="font-size:15px"></h1>
    <button class="icon-btn" onclick="editCurrent()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg></button>
    <button class="icon-btn danger" onclick="deleteCurrent()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
  </div>
  <div class="detail-hero">
    <div class="hero-inner">
      <div class="hero-top">
        <div class="hero-icon-big" id="d-icon"></div>
        <div class="hero-info">
          <div class="hero-cats"><span class="hero-cat-badge" id="d-main-cat"></span><span class="hero-cat-badge" id="d-series-badge"></span></div>
          <div class="hero-name" id="d-name"></div>
        </div>
      </div>
      <div class="hero-divider"></div>
      <div class="hero-stats">
        <div class="hero-stat"><div class="hs-label">인분</div><div class="hs-val" id="d-servings"></div></div>
        <div class="hero-stat"><div class="hs-label">소요 시간</div><div class="hs-val" id="d-time"></div></div>
        <div class="hero-stat"><div class="hs-label">재료 수</div><div class="hs-val" id="d-ing-count"></div></div>
      </div>
    </div>
  </div>
  <div class="detail-body-wrap" id="detail-scroll">
    <div class="section">
      <div class="section-title"><span class="st-icon">👥</span><span class="st-text">인분 조절</span></div>
      <div class="servings-card"><div class="servings-row">
        <label>인분 수</label>
        <input type="range" id="servings-slider" min="1" max="20" step="1" oninput="updateServings(this.value)">
        <div class="servings-out" id="servings-out">4인분</div>
      </div></div>
    </div>
    <div class="section">
      <div class="section-title"><span class="st-icon">🛒</span><span class="st-text">재료 체크리스트</span></div>
      <div class="ing-list" id="ing-list"></div>
    </div>
    <div class="section" style="padding-bottom:28px">
      <div class="section-title"><span class="st-icon">📋</span><span class="st-text">만드는 법</span></div>
      <div class="steps-list" id="steps-list"></div>
    </div>
  </div>
  <div class="timer-bar" id="timer-bar">
    <div style="flex:1"><div class="timer-display" id="timer-display">00:00</div><div class="timer-lbl" id="timer-lbl">타이머</div></div>
    <button class="t-btn primary" id="timer-toggle-btn" onclick="toggleTimer()">시작</button>
    <button class="t-btn" onclick="resetTimer()">초기화</button>
  </div>
</div>

<!-- FORM -->
<div id="form-screen" class="screen" style="background:rgba(120,70,15,0.35);backdrop-filter:blur(2px)">
  <div class="topbar">
    <button class="icon-btn" onclick="cancelForm()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    <h1 id="form-title">레시피 추가</h1>
  </div>
  <div class="form-scroll">
    <div class="form-group"><div class="form-label">레시피 이름</div><input class="form-input" type="text" id="f-name" placeholder="예: 버터 크루아상"></div>
    <div class="form-row">
      <div class="form-group"><div class="form-label">상위 카테고리</div><select class="form-select" id="f-main-cat" onchange="onMainCatChange()"><option>제빵</option><option>제과</option><option>캠핑요리</option><option>간단요리</option></select></div>
      <div class="form-group"><div class="form-label">세부 카테고리</div><select class="form-select" id="f-sub-cat"></select></div>
    </div>
    <div class="form-group">
      <div class="form-label">계열 아이콘</div>
      <div class="icon-selector-btn" onclick="openIconPicker()" id="icon-selector-btn">
        <div class="preview-icon" id="f-icon-preview"></div>
        <div class="preview-info"><div class="preview-name" id="f-icon-name">식사빵 계열</div><div class="preview-hint">탭해서 아이콘 변경</div></div>
        <svg class="preview-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><div class="form-label">기준 인분</div><input class="form-input" type="number" id="f-servings" value="4" min="1"></div>
      <div class="form-group"><div class="form-label">소요 시간</div><input class="form-input" type="text" id="f-time" placeholder="예: 2시간"></div>
    </div>
    <div class="form-group"><div class="form-label">타이머 (분, 선택)</div><input class="form-input" type="number" id="f-timer" placeholder="예: 35" min="0"></div>
    <div class="form-group">
      <div class="form-label">재료 추가</div>
      <div class="ing-add-row"><input class="form-input" type="text" id="f-ing-name" placeholder="재료명"><input class="form-input" type="text" id="f-ing-amt" placeholder="200g"></div>
      <button class="add-line-btn" style="margin-top:8px" onclick="addIng()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg> 재료 추가</button>
      <div class="chips-wrap" id="f-ing-chips"></div>
    </div>
    <div class="form-group">
      <div class="form-label">만드는 법</div>
      <div class="step-entries" id="f-step-entries"></div>
      <button class="add-line-btn" style="margin-top:8px" onclick="addFormStep()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg> 단계 추가</button>
    </div>
  </div>
  <button class="save-btn" onclick="saveRecipe()">레시피 저장 ✓</button>
</div>

<!-- ICON PICKER -->
<div class="icon-picker-overlay" id="icon-picker-overlay" style="display:none" onclick="closeIconPickerOutside(event)">
  <div class="icon-picker-sheet">
    <div class="icon-picker-handle"><h3>계열 아이콘 선택</h3><button onclick="closeIconPicker()">✕</button></div>
    <div class="icon-picker-groups" id="icon-picker-groups"></div>
  </div>
</div>

    <span class="arc-text">새 레시피 추가하기</span>
  </div>`;
  if(!list.length){
    wrap.innerHTML=`<div class="empty-state"><div class="em-icon">${info.emoji}</div><p>아직 레시피가 없어요.<br>아래에서 첫 레시피를 추가해보세요!</p></div>${addCard}`;
    return;
  }
  wrap.innerHTML=list.map((r,i)=>`
    <div class="recipe-row" style="animation-delay:${i*0.04}s" onclick="openDetail(${r.id})">
      <div class="rr-icon-box">${getSvg(r.icon||info.emoji)}</div>
      <div class="rr-body">
        <div class="rr-name">${r.name}</div>
        <div class="rr-meta">
          <span class="rr-badge series">${r.seriesLabel||r.subCat}</span>
          <span class="rr-badge">${r.servings}인분</span>
          <span class="rr-badge">${r.time}</span>
        </div>
      </div>
      <svg class="rr-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
    </div>`).join('')+addCard;
}

/* DETAIL */
function openDetail(id){
  currentId=id;const r=recipes.find(x=>x.id===id);
  baseServings=r.servings;checkedSet=new Set();
  const info=MAIN_CATS[r.mainCat];
  document.getElementById('detail-topbar-title').textContent=r.name;
  document.getElementById('d-icon').innerHTML=getSvg(r.icon||info.emoji);
  document.getElementById('d-main-cat').textContent=r.mainCat;
  document.getElementById('d-series-badge').textContent=(r.seriesLabel||r.subCat);
  document.getElementById('d-name').textContent=r.name;
  document.getElementById('d-servings').textContent=r.servings+'인분';
  document.getElementById('d-time').textContent=r.time;
  document.getElementById('d-ing-count').textContent=r.ings.length+'가지';
  const sl=document.getElementById('servings-slider');
  sl.value=r.servings;sl.max=Math.max(16,r.servings*3);
  document.getElementById('servings-out').textContent=r.servings+'인분';
  renderDetailIngs(r,r.servings);renderDetailSteps(r);
  if(r.timer){timerSec=r.timer*60;updateTimerDisplay();document.getElementById('timer-bar').style.display='flex';document.getElementById('timer-lbl').textContent=r.timer+'분 타이머';}
  else{document.getElementById('timer-bar').style.display='none';}
  stopTimer();go('detail');document.getElementById('detail-scroll').scrollTop=0;
}
function renderDetailIngs(r,servings){
  const ratio=servings/baseServings;
  document.getElementById('ing-list').innerHTML=r.ings.map((ing,i)=>{
    const checked=checkedSet.has(i);
    return `<div class="ing-row${checked?' checked':''}" onclick="toggleIng(${i})">
      <div class="ing-check">${checked?`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#FDF6E3" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>`:''}</div>
      <span class="ing-name">${ing.name}</span>
      <span class="ing-amt">${scaleAmt(ing.amt,ratio)}</span>
    </div>`;
  }).join('');
}
function toggleIng(i){if(checkedSet.has(i))checkedSet.delete(i);else checkedSet.add(i);renderDetailIngs(recipes.find(x=>x.id===currentId),parseInt(document.getElementById('servings-slider').value))}
function updateServings(v){v=parseInt(v);document.getElementById('servings-out').textContent=v+'인분';renderDetailIngs(recipes.find(x=>x.id===currentId),v)}
function scaleAmt(amt,ratio){if(Math.abs(ratio-1)<0.001)return amt;const m=amt.match(/^([\d.]+)(.*)/);if(!m)return amt;const num=parseFloat(m[1])*ratio;return(num%1===0?num:+num.toFixed(1))+m[2]}
function renderDetailSteps(r){
  document.getElementById('steps-list').innerHTML=r.steps.map((s,i)=>{
    const isLast=i===r.steps.length-1;
    return `<div class="step-item"><div class="step-num-circle">${i+1}</div><div style="flex:1"><div class="step-text">${s}</div>${r.timer&&isLast?`<button class="timer-trigger" onclick="startTimer(${r.timer})"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg> ${r.timer}분 타이머 시작</button>`:''}</div></div>`;
  }).join('');
}
function editCurrent(){
  const r=recipes.find(x=>x.id===currentId);
  editingId=currentId;formIngs=r.ings.map(i=>({...i}));formSteps=[...r.steps];
  selectedIcon=r.icon||MAIN_CATS[r.mainCat].emoji;selectedIconLabel=r.seriesLabel||r.subCat;
  document.getElementById('form-title').textContent='레시피 수정';
  document.getElementById('f-name').value=r.name;
  document.getElementById('f-main-cat').value=r.mainCat;updateSubCatOptions();
  document.getElementById('f-sub-cat').value=r.subCat;
  document.getElementById('f-servings').value=r.servings;
  document.getElementById('f-time').value=r.time;
  document.getElementById('f-timer').value=r.timer||'';
  updateIconPreview();renderFormIngs();renderFormSteps();go('form');
}
function deleteCurrent(){if(!confirm('이 레시피를 삭제할까요?'))return;recipes=recipes.filter(x=>x.id!==currentId);persist();openCat(currentMainCat)}
function goBack(){openCat(currentMainCat)}

/* TIMER */
function startTimer(min){stopTimer();timerSec=min*60;updateTimerDisplay();timerRunning=true;document.getElementById('timer-toggle-btn').textContent='일시정지';timerInterval=setInterval(()=>{if(timerSec<=0){stopTimer();document.getElementById('timer-display').textContent='완료! 🎉';return}timerSec--;updateTimerDisplay()},1000)}
function toggleTimer(){if(timerRunning){stopTimer();return}timerRunning=true;document.getElementById('timer-toggle-btn').textContent='일시정지';timerInterval=setInterval(()=>{if(timerSec<=0){stopTimer();document.getElementById('timer-display').textContent='완료! 🎉';return}timerSec--;updateTimerDisplay()},1000)}
function stopTimer(){clearInterval(timerInterval);timerRunning=false;document.getElementById('timer-toggle-btn').textContent='시작'}
function resetTimer(){stopTimer();const r=recipes.find(x=>x.id===currentId);if(r?.timer){timerSec=r.timer*60;updateTimerDisplay()}}
function updateTimerDisplay(){document.getElementById('timer-display').textContent=String(Math.floor(timerSec/60)).padStart(2,'0')+':'+String(timerSec%60).padStart(2,'0')}

/* ICON PICKER */
function openIconPicker(){
  const mc=document.getElementById('f-main-cat').value;
  const groups=ICON_DATA[mc]||[];
  document.getElementById('icon-picker-groups').innerHTML=`<div>
    <div class="icon-group-label">${mc} 계열 아이콘</div>
    <div class="icon-grid">${groups.map(g=>`
      <div class="icon-option${selectedIcon===g.icon&&selectedIconLabel===g.label?' selected':''}" onclick="selectIcon('${g.icon}','${g.label}')">
        <div class="ico">${getSvg(g.icon)}</div>
        <span class="ico-label">${g.label}</span>
      </div>`).join('')}
    </div>
  </div>`;
  document.getElementById('icon-picker-overlay').style.display='flex';
}
function selectIcon(icon,label){selectedIcon=icon;selectedIconLabel=label;updateIconPreview();closeIconPicker()}
function updateIconPreview(){
  document.getElementById('f-icon-preview').innerHTML=getSvg(selectedIcon);
  document.getElementById('f-icon-name').textContent=selectedIconLabel+' 계열';
}
function closeIconPicker(){document.getElementById('icon-picker-overlay').style.display='none'}
function closeIconPickerOutside(e){if(e.target===document.getElementById('icon-picker-overlay'))closeIconPicker()}

/* FORM */
function openHomeCatPicker(){document.getElementById('home-cat-picker').style.display='flex'}
function closeHomeCatPicker(e){if(e.target===document.getElementById('home-cat-picker'))document.getElementById('home-cat-picker').style.display='none'}
function pickHomeCat(cat){document.getElementById('home-cat-picker').style.display='none';currentMainCat=cat;openAddForm()}
function openAddForm(){
  editingId=null;formIngs=[];formSteps=[''];
  const mc=currentMainCat||'제빵';
  const fi=ICON_DATA[mc]?.[0];
  selectedIcon=fi?.icon||MAIN_CATS[mc].emoji;selectedIconLabel=fi?.label||'기본';
  document.getElementById('form-title').textContent='레시피 추가';
  ['f-name','f-time','f-timer'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-servings').value=4;
  document.getElementById('f-main-cat').value=mc;
  updateSubCatOptions();updateIconPreview();
  document.getElementById('f-ing-name').value='';document.getElementById('f-ing-amt').value='';
  renderFormIngs();renderFormSteps();go('form');
}
function onMainCatChange(){
  updateSubCatOptions();
  const mc=document.getElementById('f-main-cat').value;
  const fi=ICON_DATA[mc]?.[0];
  selectedIcon=fi?.icon||MAIN_CATS[mc].emoji;selectedIconLabel=fi?.label||'기본';
  updateIconPreview();
}
function updateSubCatOptions(){const mc=document.getElementById('f-main-cat').value;document.getElementById('f-sub-cat').innerHTML=(MAIN_CATS[mc]?.subs||[]).map(s=>`<option>${s}</option>`).join('')}
function addIng(){const n=document.getElementById('f-ing-name').value.trim();const a=document.getElementById('f-ing-amt').value.trim();if(!n){document.getElementById('f-ing-name').focus();return}formIngs.push({name:n,amt:a});document.getElementById('f-ing-name').value='';document.getElementById('f-ing-amt').value='';renderFormIngs();document.getElementById('f-ing-name').focus()}
function removeIng(i){formIngs.splice(i,1);renderFormIngs()}
function renderFormIngs(){document.getElementById('f-ing-chips').innerHTML=formIngs.map((ing,i)=>`<span class="chip" onclick="removeIng(${i})">${ing.name} ${ing.amt} <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></span>`).join('')}
function addFormStep(){formSteps.push('');renderFormSteps();setTimeout(()=>{const els=document.querySelectorAll('#f-step-entries textarea');els[els.length-1]?.focus()},50)}
function removeFormStep(i){if(formSteps.length<=1)return;formSteps.splice(i,1);renderFormSteps()}
function renderFormSteps(){document.getElementById('f-step-entries').innerHTML=formSteps.map((s,i)=>`<div class="step-entry"><div class="step-num-circle">${i+1}</div><textarea class="form-textarea" oninput="formSteps[${i}]=this.value" placeholder="단계 ${i+1} 설명...">${s}</textarea><button class="rm-btn" onclick="removeFormStep(${i})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>`).join('')}
function saveRecipe(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('레시피 이름을 입력해주세요.');document.getElementById('f-name').focus();return}
  const steps=formSteps.filter(s=>s.trim());
  if(!steps.length){alert('최소 1개의 단계를 입력해주세요.');return}
  const mainCat=document.getElementById('f-main-cat').value;
  const rec={id:editingId||nextId++,name,mainCat,subCat:document.getElementById('f-sub-cat').value,icon:selectedIcon,seriesLabel:selectedIconLabel,servings:parseInt(document.getElementById('f-servings').value)||4,time:document.getElementById('f-time').value||'—',timer:parseInt(document.getElementById('f-timer').value)||0,ings:formIngs,steps};
  if(editingId){recipes=recipes.map(r=>r.id===editingId?rec:r)}else{recipes.push(rec)}
  persist();currentMainCat=mainCat;
  if(editingId){openDetail(rec.id)}else{openCat(mainCat)}
}
function cancelForm(){if(editingId){openDetail(editingId)}else if(currentMainCat){openCat(currentMainCat)}else{goHome()}}
function go(id){document.querySelectorAll('#app .screen').forEach(s=>s.classList.remove('active'));document.getElementById(id+'-screen').classList.add('active')}

updateSubCatOptions();renderHome();
</script>
</body>
</html>
